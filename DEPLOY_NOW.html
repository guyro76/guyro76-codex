<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthorityBoost AI - Deploy Now</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #06060b 0%, #0e0e16 100%);
            font-family: 'Heebo', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            background: #0e0e16;
            border: 2px solid #7dd3fc;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(125, 211, 252, 0.3);
        }
        h1 {
            color: #7dd3fc;
            font-size: 2.5em;
            margin: 0 0 10px 0;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #7dd3fc 0%, #34d399 100%);
            color: #06060b;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 20px 0;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(125, 211, 252, 0.4);
        }
        .status {
            background: #064e3b;
            border-right: 4px solid #34d399;
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
            color: #d1fae5;
        }
        .status h3 {
            margin: 0 0 10px 0;
            color: #34d399;
        }
        .status ul {
            margin: 0;
            padding-right: 20px;
            text-align: right;
        }
        .status li {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AuthorityBoost AI</h1>
        <p class="subtitle">עכשיו זה עולה לאוויר</p>
        
        <div class="status">
            <h3>✅ האתר מוכן</h3>
            <ul>
                <li>✓ 22 עמודים בנויים</li>
                <li>✓ עברית מלא RTL</li>
                <li>✓ סמכות ודשבורד</li>
                <li>✓ UI מלא וממוד</li>
            </ul>
        </div>
        
        <button class="button" onclick="deployToVercel()">
            לחץ כאן לשליחה ל-Vercel 🚀
        </button>
        
        <p style="color: #94a3b8; margin-top: 30px; font-size: 0.9em;">
            לחץ על הכפתור להתחיל את התהליך<br>
            זה יוציא אותך ל-Vercel
        </p>
    </div>

    <script>
        function deployToVercel() {
            const repoUrl = 'https://github.com/guyro76/guyro76-codex';
            const branch = 'claude/authorityboost-ai-build-s8w237';
            const vercelDeployUrl = `https://vercel.com/new/clone?repository-url=${encodeURIComponent(repoUrl)}&branch=${branch}&project-name=guyro76-codex&repo-name=guyro76-codex`;
            
            window.location.href = vercelDeployUrl;
        }

        // Auto-redirect after 2 seconds
        setTimeout(deployToVercel, 2000);
    </script>
</body>
</html>
