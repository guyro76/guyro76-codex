name: Organo Production CI

on:
  push:
    branches: [organo-commercial]
  pull_request:
    branches: [organo-commercial]

permissions:
  contents: read

concurrency:
  group: organo-production-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Synchronize dependency lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build and verify Organo
        run: npm run build

      - name: Dependency security report
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Verify that real secrets are not committed
        run: |
          if git grep -nE '(SUPABASE_SERVICE_ROLE_KEY|SUPABASE_SECRET_KEY|OPENAI_API_KEY)=[A-Za-z0-9_./+-]{20,}' -- ':!*.example' ':!*.md'; then
            echo "A value that resembles a real secret was found in a tracked file"
            exit 1
          fi
          echo "Tracked secret scan passed"
