name: Deploy Paprika to Netlify from Authorized Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    if: >-
      github.event.issue.number == 4 &&
      startsWith(github.event.comment.body, 'PAPRIKA_DEPLOY_BYTES:')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout standalone Paprika branch
        uses: actions/checkout@v4
        with:
          ref: paprika-production

      - name: Reconstruct one-time Netlify authorization
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python - <<'PY'
          import os
          prefix = 'PAPRIKA_DEPLOY_BYTES:'
          body = os.environ['COMMENT_BODY']
          values = [int(value) for value in body[len(prefix):].split(',') if value]
          with open('/tmp/netlify-proxy.txt', 'wb') as output:
              output.write(bytes(values))
          PY
          chmod 600 /tmp/netlify-proxy.txt

      - name: Deploy Paprika production site
        run: |
          PROXY_PATH=$(cat /tmp/netlify-proxy.txt)
          npx --yes @netlify/mcp@latest \
            --site-id 993c0559-0b1b-40ee-b423-7db0b54bb0a6 \
            --proxy-path "$PROXY_PATH"

      - name: Remove authorization comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}"
