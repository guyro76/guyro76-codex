name: Paprika Vercel Prebuilt

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  deploy:
    if: github.head_ref == 'paprika-production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: paprika-production
      - run: mkdir -p .vercel/output/static && cp index.html .vercel/output/static/index.html && printf '{"version":3}' > .vercel/output/config.json
      - run: npx --yes vercel@latest link --yes --project paprika-ppc-guyro --scope guy-rosenberg-s-projects --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - run: npx --yes vercel@latest deploy --prebuilt --prod --yes --scope guy-rosenberg-s-projects --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
