name: Paprika Supabase Bootstrap

on:
  push:
    branches: [dbcheck]
    paths:
      - '.github/workflows/paprika-supabase-bootstrap.yml'
      - 'paprika-app/supabase-bootstrap-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dbcheck
      - name: Bootstrap Supabase project when token exists
        shell: bash
        run: |
          set +e
          mkdir -p paprika-app/bootstrap
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            printf '{"status":"MISSING_TOKEN","secret_name":"SUPABASE_ACCESS_TOKEN"}\n' > paprika-app/bootstrap/supabase-result.json
          else
            orgs=$(curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" https://api.supabase.com/v1/organizations)
            org_id=$(printf '%s' "$orgs" | python -c "import sys,json; d=json.load(sys.stdin); print((d[0].get('id') if isinstance(d,list) and d else ''))" 2>/dev/null)
            if [ -z "$org_id" ]; then
              printf '{"status":"TOKEN_PRESENT_ORG_NOT_FOUND"}\n' > paprika-app/bootstrap/supabase-result.json
            else
              existing=$(curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" https://api.supabase.com/v1/projects)
              ref=$(printf '%s' "$existing" | python -c "import sys,json; d=json.load(sys.stdin); print(next((x.get('ref','') for x in d if x.get('name')=='paprika-agency-os'),''))" 2>/dev/null)
              created=false
              if [ -z "$ref" ]; then
                dbpass=$(python -c "import secrets,string; a=string.ascii_letters+string.digits+'!@#%'; print(''.join(secrets.choice(a) for _ in range(32)))")
                payload=$(python -c "import json,os; print(json.dumps({'name':'paprika-agency-os','organization_id':os.environ['ORG_ID'],'region':'eu-central-1','plan':'free','db_pass':os.environ['DBPASS']}))" ORG_ID="$org_id" DBPASS="$dbpass")
                response=$(curl -sS -X POST -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" -d "$payload" https://api.supabase.com/v1/projects)
                ref=$(printf '%s' "$response" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('ref',''))" 2>/dev/null)
                created=true
              fi
              if [ -z "$ref" ]; then
                printf '{"status":"PROJECT_CREATE_FAILED"}\n' > paprika-app/bootstrap/supabase-result.json
              else
                printf '{"status":"PROJECT_READY","project_ref":"%s","created":%s}\n' "$ref" "$created" > paprika-app/bootstrap/supabase-result.json
              fi
            fi
          fi
          git config user.name "paprika-bootstrap-bot"
          git config user.email "actions@github.com"
          git add paprika-app/bootstrap/supabase-result.json
          git commit -m "Record Paprika Supabase bootstrap result" || true
          git push origin HEAD:dbcheck
          exit 0
