name: Deploy Paprika Prebuilt to Vercel

on:
  push:
    branches: [paprika-production]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout standalone Paprika branch
        uses: actions/checkout@v4

      - name: Verify Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is not configured in GitHub Actions secrets"
            exit 1
          fi

      - name: Create or link the dedicated Paprika project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx --yes vercel@latest project add paprika-ppc-guyro --scope guy-rosenberg-s-projects --token "$VERCEL_TOKEN" || true
          npx --yes vercel@latest link --yes --project paprika-ppc-guyro --scope guy-rosenberg-s-projects --token "$VERCEL_TOKEN"

      - name: Build Vercel output locally
        run: |
          mkdir -p .vercel/output/static
          cp index.html .vercel/output/static/index.html
          printf '{"version":3}' > .vercel/output/config.json

      - name: Deploy prebuilt production output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@latest deploy --prebuilt --prod --yes --scope guy-rosenberg-s-projects --token "$VERCEL_TOKEN"
